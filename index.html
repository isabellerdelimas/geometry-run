<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometry Run</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="hud">
      <div>
        <p class="eyebrow">Geometry Run</p>
        <h1 id="levelTitle">Level 1</h1>
      </div>
      <div class="stats">
        <span id="progressLabel">0%</span>
        <button id="restartBtn" type="button">Restart</button>
      </div>
    </section>

    <section class="game-wrap">
      <canvas id="game" width="960" height="420" aria-label="Geometry Run game"></canvas>
      <div id="message" class="message"></div>
    </section>

    <section class="controls">
      <div class="jump-controls" aria-label="Jump controls">
        <button class="jump-btn" data-jump="short" type="button">Short</button>
        <button class="jump-btn" data-jump="medium" type="button">Medium</button>
        <button class="jump-btn" data-jump="high" type="button">High</button>
      </div>
      <p>Space still adapts to your hold · the buttons give you exact jump heights</p>
    </section>

    <section class="music-panel">
      <div>
        <p class="eyebrow">Music</p>
        <h2>Pick the pulse</h2>
      </div>
      <div id="musicList" class="music-list"></div>
    </section>

    <section class="avatar-panel">
      <div>
        <p class="eyebrow">Jumper avatars</p>
        <h2>Pick your shape</h2>
      </div>
      <div id="avatarList" class="avatar-list"></div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
